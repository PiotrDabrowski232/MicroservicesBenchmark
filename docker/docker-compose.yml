version: "3.8"
services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    labels:
      app: "true"
      env: "dev"
      service_name: "rabbitmq"
      tier: "infra"
    networks:
      - thesis-net
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    labels:
      app: "true"
      env: "dev"
      service_name: "kafka"
      tier: "infra"
    networks:
      - thesis-net
    healthcheck:
      test:
        [
          "CMD",
          "kafka-topics",
          "--list",
          "--bootstrap-server",
          "localhost:9092",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  db:
    image: postgres:16
    container_name: microservices-db
    environment:
      POSTGRES_DB: microDb
      POSTGRES_USER: microDb_user
      POSTGRES_PASSWORD: microDb_pass
    labels:
      app: "true"
      env: "dev"
      service_name: "db"
      tier: "infra"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [thesis-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U microDb_user -d microDb"]
      interval: 5s
      timeout: 5s
      retries: 20

  order-service:
    image: microservices-benchmark/order-service:latest
    build:
      context: ../
      dockerfile: src/Services/OrderService/Dockerfile
    container_name: order-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__RabbitMq=amqp://guest:guest@rabbitmq:5672
      - ConnectionStrings__Kafka=kafka:9092
      - ConnectionStrings__Postgres=Host=db;Port=5432;Database=microDb;Username=microDb_user;Password=microDb_pass
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=inventory-service
    labels:
      app: "true"
      env: "dev"
      service_name: "order-service"
      tier: "api"
    ports:
      - "5001:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - thesis-net

  inventory-service:
    image: microservices-benchmark/inventory-service:latest
    build:
      context: ../
      dockerfile: src/Services/InventoryService/Dockerfile
    container_name: inventory-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__RabbitMq=amqp://guest:guest@rabbitmq:5672
      - ConnectionStrings__Kafka=kafka:9092
      - ConnectionStrings__Postgres=Host=db;Port=5432;Database=microDb;Username=microDb_user;Password=microDb_pass
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=inventory-service
    labels:
      app: "true"
      env: "dev"
      service_name: "inventory-service"
      tier: "api"
    ports:
      - "5002:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - thesis-net

  payment-service:
    image: microservices-benchmark/payment-service:latest
    build:
      context: ../
      dockerfile: src/Services/PaymentService/Dockerfile
    container_name: payment-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__RabbitMq=amqp://guest:guest@rabbitmq:5672
      - ConnectionStrings__Kafka=kafka:9092
      - ConnectionStrings__Postgres=Host=db;Port=5432;Database=microDb;Username=microDb_user;Password=microDb_pass
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=inventory-service
    labels:
      app: "true"
      env: "dev"
      service_name: "payment-service"
      tier: "api"
    ports:
      - "5003:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - thesis-net

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "9464:9464"
    networks: [thesis-net]

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    user: root
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [thesis-net]

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks: [thesis-net]

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    user: root
    depends_on: [loki]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail/promtail.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks: [thesis-net]

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on: [prometheus, loki]
    networks: [thesis-net]

networks:
  thesis-net:
    driver: bridge

volumes:
  pgdata:
  grafana_data:
  prometheus_data:
