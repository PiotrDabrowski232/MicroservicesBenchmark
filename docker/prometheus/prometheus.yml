global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "docker-app-metrics"
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s

    relabel_configs:
      - source_labels: ["__meta_docker_container_label_metrics"]
        regex: true
        action: keep

      - source_labels:
          [
            "__meta_docker_container_network_ip",
            "__meta_docker_container_label_metrics_port",
          ]
        separator: ":"
        target_label: __address__

      - source_labels: ["__meta_docker_container_label_metrics_path"]
        target_label: __metrics_path__
        regex: (.+)
        replacement: $1
        action: replace

      - source_labels:
          ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: service

      - source_labels: ["__meta_docker_container_label_env"]
        target_label: env
