syntax = "proto3";

option csharp_namespace = "OrderService.Infrastructure.Protos";

package inventory;

service Inventory {
  rpc ReserveProduct (ReserveRequestMessage) returns (ReserveResponseMessage);
  rpc GetProductsBenchmark (GetProductsRequest) returns (GetProductsResponse);
}

message ReserveRequestMessage {
  string productId = 1;
  int32 quantity = 2;
}

message ReserveResponseMessage {
  bool success = 1;
  string errorMessage = 2;
}

message GetProductsRequest {
  int32 count = 1;
}

message ProductDtoMessage {
  string id = 1;
  string name = 2;
  double price = 3;
  string description = 4;
}

message GetProductsResponse {
  repeated ProductDtoMessage products = 1;
}
